<!DOCTYPE html>
<html lang="en">
<head>
    <title>Robin Niinemets - Project</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Project detail page for Robin Niinemets." />
    <link rel="stylesheet" href="/src/styles.css" />
    <link rel="stylesheet" href="/src/prism/prism.css" />
    <link rel="shortcut icon" type="image/x-icon" href="/assets/LinkedIn Company Profile_1.png">
    <script type="module" src="/src/main.js" defer></script>
</head>
<body class="body">
    <div class="cursor hide-on-mobile"></div>
    <div id="loading-screen">
        <div class="pong-loader"></div>
    </div>
    <main>
        <header id="header-back"></header>
        <img class="hero-img" id="project-hero-img" src="" alt="">
        <section class="about-project">
            <div>
                <h1 class="big-card-header" id="project-title">Project Title</h1>
                <h2 class="h2 space" id="project-subtitle">Project subtitle</h2>
            </div>
            <div class="about-section">
                <div>
                    <p class="paragraph two-columns" id="project-description">Loading project...</p>
                </div>
                <div class="short-info" id="project-info"></div>
                <div class="buttons" id="project-buttons"></div>
                <div class="line"></div>
            </div>
        </section>
        <section class="content">
            <div class="table-of-contents hide-on-mobile" id="table-of-contents">
                <h2 class="medium-card-header">Table Of Contents</h2>
                <ol id="toc-list"></ol>
            </div>
            <article class="contents" id="project-content"></article>
        </section>
        <div class="space-100"></div>
    </main>
    <button class="back-to-top project-page" aria-label="Back to top">↑</button>
    <footer id="footer"></footer>
    <script src="/src/prism/prism-core.min.js"></script>
</body>
</html>
