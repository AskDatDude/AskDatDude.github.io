name: Test

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DENO_VERSION: 2.9.1

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Install dependencies
        run: deno install --frozen

      - name: Test
        run: deno task test:all
