name: Test

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test:all
